name: Release

on:
  workflow_dispatch:
  tags:
    - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SVNFileManager/SVNFileManager.csproj

      - name: Build
        run: dotnet build SVNFileManager/SVNFileManager.csproj -c Release -r win-x64 --self-contained

      - name: Publish
        run: dotnet publish SVNFileManager/SVNFileManager.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SVNFileManager-exe
          path: ./publish/SVNFileManager.exe
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: SVNFileManager-exe
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
